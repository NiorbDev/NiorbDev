name: generate snake animation

on:
  schedule:
    # se ejecuta todos los días a las 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch: {} # permite correrlo manualmente desde la pestaña Actions
  push:
    branches:
      - main # se regenera cada vez que haces push a main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk@v3
        with:
          github_user_name: NiorbDev
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#2d1b45&color_dots=#161320,#3b1e63,#6a0dad,#c000ff,#ff2fd0

      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
