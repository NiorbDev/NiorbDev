name: Generate Contribution Art

on:
  schedule:
    - cron: "0 0 * * *" # todos los días a medianoche UTC
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generar grafo con tetrominoes
        uses: leereilly/contribution-graph-art@v1
        with:
          github_user_name: ${{ github.repository_owner }}
          tetromino_count: "5"
          output_path: dist/contribution-graph-tetrominoes.svg

      - name: Publicar SVG en la rama output
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
